<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS · Análisis de Sentimientos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── Variables ── */
  :root {
    --bg:       #0c0e14;
    --surface:  #13161f;
    --border:   #1e2233;
    --border2:  #2a3050;
    --text:     #d4d8ef;
    --muted:    #5a6080;
    --accent:   #4f8cff;
    --accent2:  #7c5cfc;
    --pos:      #34d399;
    --neg:      #f87171;
    --neu:      #fbbf24;
    --radius:   10px;
    --mono:     'DM Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }
  .logo {
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .logo span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .badge-api {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(79,140,255,.12);
    color: var(--accent);
    border: 1px solid rgba(79,140,255,.25);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .btn-seed {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(79,140,255,.1);
    color: var(--accent);
    border: 1px solid rgba(79,140,255,.3);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-seed:hover { background: rgba(79,140,255,.2); }

  /* ── Sidebar ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 18px 12px;
  }
  .job-item {
    padding: 11px 18px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .job-item:hover { background: rgba(255,255,255,.03); }
  .job-item.active {
    background: rgba(79,140,255,.07);
    border-left-color: var(--accent);
  }
  .job-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .dot-completed { background: var(--pos); box-shadow: 0 0 6px var(--pos); }
  .dot-processing { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
  .dot-pending { background: var(--muted); }
  .dot-failed { background: var(--neg); box-shadow: 0 0 6px var(--neg); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .job-meta { flex: 1; min-width: 0; }
  .job-id { font-size: 11px; color: var(--text); font-weight: 500; font-family: var(--mono); }
  .job-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── Main ── */
  main {
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--muted);
    gap: 8px;
  }
  .empty-icon { font-size: 36px; opacity: .4; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.2px;
  }
  .card-body { padding: 20px; }

  /* ── Status card ── */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 22px; font-family: var(--sans); font-weight: 700; color: #fff; margin-top: 4px; }
  .stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── Status badge ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }
  .s-completed { background: rgba(52,211,153,.1); color: var(--pos); border: 1px solid rgba(52,211,153,.2); }
  .s-processing { background: rgba(79,140,255,.1); color: var(--accent); border: 1px solid rgba(79,140,255,.2); }
  .s-pending   { background: rgba(90,96,128,.1); color: var(--muted); border: 1px solid rgba(90,96,128,.2); }
  .s-failed    { background: rgba(248,113,113,.1); color: var(--neg); border: 1px solid rgba(248,113,113,.2); }

  /* ── Progress bar ── */
  .progress-wrap { margin-top: 4px; }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s ease;
  }
  .progress-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* ── Report donut + bars ── */
  .report-grid { display: grid; grid-template-columns: 180px 1fr; gap: 24px; align-items: center; }
  .donut-wrap { position: relative; width: 160px; height: 160px; }
  .donut-wrap svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .donut-total { font-family: var(--sans); font-size: 26px; font-weight: 800; color: #fff; }
  .donut-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .sent-bars { display: flex; flex-direction: column; gap: 12px; }
  .sent-row { display: flex; flex-direction: column; gap: 4px; }
  .sent-row-top { display: flex; justify-content: space-between; }
  .sent-name { font-size: 11px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .sent-name::before { content: ''; width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  .sent-pos::before { background: var(--pos); }
  .sent-neg::before { background: var(--neg); }
  .sent-neu::before { background: var(--neu); }
  .sent-pct { font-size: 11px; font-weight: 500; }
  .sent-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sent-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }
  .fill-pos { background: var(--pos); }
  .fill-neg { background: var(--neg); }
  .fill-neu { background: var(--neu); }
  .score-row {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .score-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .score-val { font-family: var(--sans); font-size: 18px; font-weight: 700; }

  /* ── Cached badge ── */
  .cached-badge {
    font-size: 10px;
    background: rgba(124,92,252,.12);
    color: var(--accent2);
    border: 1px solid rgba(124,92,252,.25);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ── Results table ── */
  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(79,140,255,.12); color: var(--accent); border-color: var(--accent); }
  .filter-btn.f-pos.active { background: rgba(52,211,153,.1); color: var(--pos); border-color: var(--pos); }
  .filter-btn.f-neg.active { background: rgba(248,113,113,.1); color: var(--neg); border-color: var(--neg); }
  .filter-btn.f-neu.active { background: rgba(251,191,36,.1); color: var(--neu); border-color: var(--neu); }

  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table tr:hover td { background: rgba(255,255,255,.02); }
  .text-cell { max-width: 380px; color: var(--text); line-height: 1.5; }
  .score-cell { font-family: var(--mono); font-size: 12px; font-weight: 500; }
  .sent-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    font-weight: 500; white-space: nowrap;
  }
  .chip-positive { background: rgba(52,211,153,.1); color: var(--pos); }
  .chip-negative { background: rgba(248,113,113,.1); color: var(--neg); }
  .chip-neutral  { background: rgba(251,191,36,.1);  color: var(--neu); }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; padding-top: 16px;
  }
  .page-btn {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: .35; cursor: not-allowed; }
  .page-btn.current { background: rgba(79,140,255,.1); color: var(--accent); border-color: var(--accent); }
  .page-info { font-size: 10px; color: var(--muted); }

  /* ── Error/not-available states ── */
  .info-box {
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .info-warn { background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.2); color: var(--neu); }
  .info-err  { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); color: var(--neg); }

  /* ── Loading ── */
  .loader { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Endpoint pill ── */
  .endpoint-pill {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
  }
  .method { color: var(--pos); margin-right: 4px; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">LMS<span>·</span>Sentimientos</div>
  <div class="header-right">
    <span class="badge-api">API localhost:8000</span>
    <button class="btn-seed" onclick="reseed()">↺ Regenerar datos</button>
  </div>
</header>

<!-- ══ SIDEBAR ══ -->
<aside id="sidebar">
  <div class="sidebar-title">Jobs</div>
  <div id="job-list"><div style="padding:18px;color:var(--muted)"><span class="loader"></span></div></div>
</aside>

<!-- ══ MAIN ══ -->
<main id="main-panel">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">◎</div>
    <div>Selecciona un job del panel izquierdo</div>
  </div>
</main>

<script>
const API = 'http://localhost:8000/api';
let currentJobId = null;
let currentPage  = 1;
let currentSent  = '';

// ── Fetch helpers ──────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API + path);
  const data = await r.json();
  return { ok: r.ok, status: r.status, data };
}

// ── Sidebar ───────────────────────────────────────────────────
async function loadJobs() {
  const { ok, data } = await apiFetch('/jobs');
  if (!ok) return;
  const list = document.getElementById('job-list');
  list.innerHTML = data.map(j => `
    <div class="job-item" id="ji-${j.id}" onclick="selectJob('${j.id}')">
      <div class="job-dot dot-${j.status}"></div>
      <div class="job-meta">
        <div class="job-id">${j.id.slice(0,8)}…</div>
        <div class="job-sub">${j.status} · ${j.processed_texts}/${j.total_texts} textos</div>
      </div>
    </div>
  `).join('');
}

function markActive(jobId) {
  document.querySelectorAll('.job-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ji-${jobId}`);
  if (el) el.classList.add('active');
}

// ── Select job ────────────────────────────────────────────────
async function selectJob(jobId) {
  currentJobId = jobId;
  currentPage  = 1;
  currentSent  = '';
  markActive(jobId);

  const panel = document.getElementById('main-panel');
  panel.innerHTML = '<div class="empty-state"><span class="loader"></span></div>';

  const [statusRes, reportRes] = await Promise.all([
    apiFetch(`/jobs/${jobId}`),
    apiFetch(`/jobs/${jobId}/report`),
  ]);

  const job    = statusRes.data;
  const report = reportRes.ok ? reportRes.data : null;
  const reportErr = !reportRes.ok ? reportRes.data : null;

  panel.innerHTML = `
    ${renderStatusCard(job)}
    ${report ? renderReportCard(report) : renderReportUnavailable(job, reportErr)}
    ${renderResultsCard(jobId)}
  `;

  // Cargar resultados
  await loadResults(jobId, 1, '');

  // Activar botones de filtro
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSent = btn.dataset.sent;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadResults(jobId, 1, currentSent);
    });
  });
}

// ── Status card ───────────────────────────────────────────────
function renderStatusCard(job) {
  const pct = job.progress_percentage ?? 0;
  const statusBadge = `<span class="status-badge s-${job.status}">
    <span class="job-dot dot-${job.status}" style="width:6px;height:6px;margin:0"></span>
    ${job.status}
  </span>`;
  const progressHtml = (job.status === 'processing' || job.status === 'completed') ? `
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${pct}% completado</div>
    </div>` : '';

  const errorHtml = job.error_message ? `
    <div class="info-box info-err" style="margin-top:12px">⚠ ${job.error_message}</div>` : '';

  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Estado del Job</span>
      <span class="endpoint-pill"><span class="method">GET</span>/jobs/${job.id.slice(0,8)}…</span>
    </div>
    <div class="card-body">
      <div class="status-grid">
        <div class="stat-box">
          <div class="stat-label">Estado</div>
          <div style="margin-top:6px">${statusBadge}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total textos</div>
          <div class="stat-value">${job.total_texts}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Procesados</div>
          <div class="stat-value">${job.processed_texts}</div>
          ${progressHtml}
        </div>
        <div class="stat-box">
          <div class="stat-label">Creado</div>
          <div class="stat-value" style="font-size:13px">${job.created_at.replace('T',' ')}</div>
        </div>
      </div>
      ${errorHtml}
    </div>
  </div>`;
}

// ── Report card ───────────────────────────────────────────────
function renderReportCard(r) {
  const total = r.total_analyzed || 1;
  const scoreColor = r.average_score > 0.1 ? 'var(--pos)' : r.average_score < -0.1 ? 'var(--neg)' : 'var(--neu)';

  // SVG donut
  const R = 70, cx = 80, cy = 80, stroke = 14;
  const circ = 2 * Math.PI * R;
  function arc(pct, offset) {
    return `stroke-dasharray="${(pct/100)*circ} ${circ}" stroke-dashoffset="${-offset*circ/100}"`;
  }
  const offPos = 0;
  const offNeg = r.positive_percentage;
  const offNeu = r.positive_percentage + r.negative_percentage;

  const donut = `
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--pos)" stroke-width="${stroke}"
        stroke-dasharray="${(r.positive_percentage/100)*circ} ${circ}" stroke-dashoffset="0"
        stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--neg)" stroke-width="${stroke}"
        stroke-dasharray="${(r.negative_percentage/100)*circ} ${circ}"
        stroke-dashoffset="${-(offNeg/100)*circ}"
        stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--neu)" stroke-width="${stroke}"
        stroke-dasharray="${(r.neutral_percentage/100)*circ} ${circ}"
        stroke-dashoffset="${-(offNeu/100)*circ}"
        stroke-linecap="round"/>
    </svg>`;

  const cachedHtml = r.cached ? `<span class="cached-badge">⚡ caché</span>` : '';

  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Reporte Agregado</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${cachedHtml}
        <span class="endpoint-pill"><span class="method">GET</span>/jobs/…/report</span>
      </div>
    </div>
    <div class="card-body">
      <div class="report-grid">
        <div class="donut-wrap">
          ${donut}
          <div class="donut-center">
            <div class="donut-total">${r.total_analyzed}</div>
            <div class="donut-label">textos</div>
          </div>
        </div>
        <div>
          <div class="sent-bars">
            <div class="sent-row">
              <div class="sent-row-top">
                <span class="sent-name sent-pos">Positivos — ${r.positive_count}</span>
                <span class="sent-pct" style="color:var(--pos)">${r.positive_percentage}%</span>
              </div>
              <div class="sent-bar"><div class="sent-fill fill-pos" style="width:${r.positive_percentage}%"></div></div>
            </div>
            <div class="sent-row">
              <div class="sent-row-top">
                <span class="sent-name sent-neg">Negativos — ${r.negative_count}</span>
                <span class="sent-pct" style="color:var(--neg)">${r.negative_percentage}%</span>
              </div>
              <div class="sent-bar"><div class="sent-fill fill-neg" style="width:${r.negative_percentage}%"></div></div>
            </div>
            <div class="sent-row">
              <div class="sent-row-top">
                <span class="sent-name sent-neu">Neutrales — ${r.neutral_count}</span>
                <span class="sent-pct" style="color:var(--neu)">${r.neutral_percentage}%</span>
              </div>
              <div class="sent-bar"><div class="sent-fill fill-neu" style="width:${r.neutral_percentage}%"></div></div>
            </div>
          </div>
          <div class="score-row">
            <span class="score-lbl">Score promedio</span>
            <span class="score-val" style="color:${scoreColor}">${r.average_score > 0 ? '+' : ''}${r.average_score}</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderReportUnavailable(job, errData) {
  const msg = errData?.error ?? `El reporte no está disponible (status: ${job.status})`;
  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Reporte Agregado</span>
      <span class="endpoint-pill"><span class="method">GET</span>/jobs/…/report</span>
    </div>
    <div class="card-body">
      <div class="info-box info-warn">⏳ ${msg}</div>
    </div>
  </div>`;
}

// ── Results card shell ────────────────────────────────────────
function renderResultsCard(jobId) {
  return `
  <div class="card">
    <div class="card-header">
      <span class="card-title">Resultados Paginados</span>
      <span class="endpoint-pill"><span class="method">GET</span>/jobs/…/results</span>
    </div>
    <div class="card-body" style="padding-bottom:10px">
      <div class="filter-row" style="margin-bottom:16px">
        <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Filtrar:</span>
        <button class="filter-btn active" data-sent="">Todos</button>
        <button class="filter-btn f-pos" data-sent="positive">Positivos</button>
        <button class="filter-btn f-neg" data-sent="negative">Negativos</button>
        <button class="filter-btn f-neu" data-sent="neutral">Neutrales</button>
      </div>
      <div id="results-area"><div class="empty-state" style="height:80px"><span class="loader"></span></div></div>
    </div>
  </div>`;
}

// ── Load results ──────────────────────────────────────────────
async function loadResults(jobId, page, sentiment) {
  const area = document.getElementById('results-area');
  if (!area) return;
  area.innerHTML = '<div class="empty-state" style="height:80px"><span class="loader"></span></div>';

  const qs = `?page=${page}&per_page=8${sentiment ? '&sentiment=' + sentiment : ''}`;
  const { ok, data } = await apiFetch(`/jobs/${jobId}/results${qs}`);
  if (!ok) {
    area.innerHTML = '<div class="info-box info-warn">No hay resultados disponibles.</div>';
    return;
  }

  if (data.total_items === 0) {
    area.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:12px 0">Sin resultados para este filtro.</div>';
    return;
  }

  const rows = data.items.map(item => {
    const scoreStr = item.score > 0 ? `+${item.score.toFixed(3)}` : item.score.toFixed(3);
    const scoreColor = item.sentiment === 'positive' ? 'var(--pos)' : item.sentiment === 'negative' ? 'var(--neg)' : 'var(--neu)';
    return `
      <tr>
        <td class="text-cell">${item.original_text}</td>
        <td><span class="sent-chip chip-${item.sentiment}">${item.sentiment}</span></td>
        <td class="score-cell" style="color:${scoreColor}">${scoreStr}</td>
        <td style="color:var(--muted);font-size:10px;white-space:nowrap">${item.processed_at.replace('T',' ')}</td>
      </tr>`;
  }).join('');

  // Pagination numbers
  const pages = [];
  for (let p = Math.max(1, page-2); p <= Math.min(data.total_pages, page+2); p++) pages.push(p);
  const paginationNums = pages.map(p =>
    `<button class="page-btn${p===page?' current':''}" onclick="goPage(${p})">${p}</button>`
  ).join('');

  area.innerHTML = `
    <table class="results-table">
      <thead><tr>
        <th>Texto</th><th>Sentimiento</th><th>Score</th><th>Procesado</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pagination">
      <button class="page-btn" onclick="goPage(${page-1})" ${!data.has_prev?'disabled':''}>← Ant</button>
      ${paginationNums}
      <button class="page-btn" onclick="goPage(${page+1})" ${!data.has_next?'disabled':''}>Sig →</button>
      <span class="page-info">${data.total_items} resultados · pág ${page}/${data.total_pages}</span>
    </div>`;
}

function goPage(page) {
  if (!currentJobId) return;
  currentPage = page;
  loadResults(currentJobId, page, currentSent);
}

// ── Reseed ────────────────────────────────────────────────────
async function reseed() {
  const btn = document.querySelector('.btn-seed');
  btn.textContent = '↺ Regenerando…';
  btn.disabled = true;
  await fetch(API + '/seed', { method: 'POST' });
  currentJobId = null;
  document.getElementById('main-panel').innerHTML = `
    <div class="empty-state"><div class="empty-icon">◎</div><div>Selecciona un job del panel izquierdo</div></div>`;
  await loadJobs();
  btn.textContent = '↺ Regenerar datos';
  btn.disabled = false;
}

// ── Init ──────────────────────────────────────────────────────
loadJobs();
</script>
